# ETF data refresh against Supabase + EODHD
# Schedules: weekly return updates, monthly fundamentals + returns.
# Manual: optional discover (rebuilds data/etf-universe.json on the runner) then seeds.
#
# Repo secrets: EODHD_API_KEY, PUBLIC_SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY

name: ETF data refresh

on:
  schedule:
    - cron: '0 22 * * 0' # Sunday 22:00 UTC — prices / returns
    - cron: '0 2 1 * *' # 1st of month 02:00 UTC — fundamentals + prices
  workflow_dispatch:
    inputs:
      run_discover:
        description: Rebuild etf-universe.json (npm run discover:etfs), then seed
        type: boolean
        default: false
      run_fundamentals:
        description: Run seed:fundamentals (after discover if selected)
        type: boolean
        default: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ETF pipelines
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${EODHD_API_KEY:-}" ] || [ -z "${PUBLIC_SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "::error::Missing one or more secrets (EODHD_API_KEY, PUBLIC_SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY)"
            exit 1
          fi

          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "workflow_dispatch" ]; then
            DISC="${{ inputs.run_discover }}"
            FUND="${{ inputs.run_fundamentals }}"
            if [ "$DISC" = "true" ]; then
              npm run discover:etfs
            fi
            if [ "$FUND" = "true" ]; then
              npm run seed:fundamentals
            fi
            npm run seed:prices
            exit 0
          fi

          DAY=$(date -u +%e | tr -d ' ')
          HOUR=$(date -u +%H)
          DOW=$(date -u +%u)

          if [ "$DAY" = "1" ] && [ "$HOUR" = "02" ]; then
            echo "Monthly run: fundamentals + prices"
            npm run seed:fundamentals
            npm run seed:prices
          elif [ "$DOW" = "7" ] && [ "$HOUR" = "22" ]; then
            echo "Weekly run: prices only"
            npm run seed:prices
          else
            echo "Schedule fired outside expected window (day=$DAY hour=$HOUR dow=$DOW); skipping."
          fi
